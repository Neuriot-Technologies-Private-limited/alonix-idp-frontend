name: Deploy frontend to Lightning

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lightning-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CONTAINER_NAME: alonix-idp-frontend
  SERVICE_PORT: "5173"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Build Docker image
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || '' }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL || '' }}
          VITE_SOCKET_PATH: ${{ vars.VITE_SOCKET_PATH || '' }}
        run: |
          VITE_SOCKET_PATH="${VITE_SOCKET_PATH:-/socket.io}"
          docker build \
            --platform linux/amd64 \
            --build-arg VITE_API_BASE_URL="${VITE_API_BASE_URL}" \
            --build-arg VITE_SOCKET_URL="${VITE_SOCKET_URL}" \
            --build-arg VITE_SOCKET_PATH="${VITE_SOCKET_PATH}" \
            -t "${CONTAINER_NAME}:${IMAGE_TAG}" \
            -t "${CONTAINER_NAME}:latest" \
            .

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Lightning CLI
        run: pip install "lightning-sdk>=2025.11"

      - name: Resolve Lightning context
        env:
          LIGHTNING_TEAMSPACE_RAW: ${{ vars.LIGHTNING_TEAMSPACE || '' }}
        run: |
          LIGHTNING_TEAMSPACE="${LIGHTNING_TEAMSPACE_RAW:-}"
          if [ -z "${LIGHTNING_TEAMSPACE}" ]; then
            echo "::warning::LIGHTNING_TEAMSPACE is unset — push will be skipped."
            echo "LIGHTNING_SKIP_REMOTE=1" >> "$GITHUB_ENV"
            exit 0
          fi
          if ! echo "${LIGHTNING_TEAMSPACE}" | grep -qE '^[^/]+/[^/]+$'; then
            echo "::warning::LIGHTNING_TEAMSPACE should be OWNER/TEAMSPACE — skipping push."
            echo "LIGHTNING_SKIP_REMOTE=1" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "LIGHTNING_SKIP_REMOTE=0" >> "$GITHUB_ENV"
          echo "Using teamspace=${LIGHTNING_TEAMSPACE}"

      - name: Push image to LitCR
        if: env.LIGHTNING_SKIP_REMOTE == '0'
        env:
          LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID || '' }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY || '' }}
          LIGHTNING_TEAMSPACE: ${{ vars.LIGHTNING_TEAMSPACE || '' }}
        run: |
          lightning container upload "${CONTAINER_NAME}" \
            --teamspace "${LIGHTNING_TEAMSPACE}" \
            --tag "${IMAGE_TAG}" \
            --platform linux/amd64

          lightning container upload "${CONTAINER_NAME}" \
            --teamspace "${LIGHTNING_TEAMSPACE}" \
            --tag latest \
            --platform linux/amd64

      - name: Set deployment metadata
        id: meta
        if: env.LIGHTNING_SKIP_REMOTE == '0'
        env:
          LIGHTNING_TEAMSPACE: ${{ vars.LIGHTNING_TEAMSPACE || '' }}
        run: |
          OWNER="${LIGHTNING_TEAMSPACE%%/*}"
          TS="${LIGHTNING_TEAMSPACE#*/}"
          IMAGE="litcr.io/lit-container/${OWNER}/${TS}/${CONTAINER_NAME}:${IMAGE_TAG}"
          IMAGE_LATEST="litcr.io/lit-container/${OWNER}/${TS}/${CONTAINER_NAME}:latest"
          DEPLOYMENTS_URL="https://lightning.ai/${OWNER}/${TS}/deployments"
          CONTAINERS_URL="https://lightning.ai/${OWNER}/${TS}/containers/${CONTAINER_NAME}"

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"
          echo "deployments_url=${DEPLOYMENTS_URL}" >> "$GITHUB_OUTPUT"
          echo "containers_url=${CONTAINERS_URL}" >> "$GITHUB_OUTPUT"
          echo "service_port=${SERVICE_PORT}" >> "$GITHUB_OUTPUT"

          echo "IMAGE=${IMAGE}"
          echo "IMAGE_LATEST=${IMAGE_LATEST}"
          echo "SERVICE_PORT=${SERVICE_PORT}"

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### Frontend — Lightning"
            echo ""
            if [ "${{ env.LIGHTNING_SKIP_REMOTE }}" = "1" ]; then
              echo "_Push skipped: set \`LIGHTNING_TEAMSPACE\`._"
              echo ""
            fi
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Container image | \`${{ steps.meta.outputs.image || '—' }}\` |"
            echo "| Latest tag | \`${{ steps.meta.outputs.image_latest || '—' }}\` |"
            echo "| Port (set in Deployment) | \`${{ steps.meta.outputs.service_port || '5173' }}\` |"
            echo "| Containers (registry) | \`${{ steps.meta.outputs.containers_url || '—' }}\` |"
            echo "| Deployments (live app) | \`${{ steps.meta.outputs.deployments_url || '—' }}\` |"
            echo ""
            echo "Missing secrets/vars use empty string (\`|| ''\` in YAML) — workflow does **not** fail on missing secrets."
          } >> "$GITHUB_STEP_SUMMARY"
